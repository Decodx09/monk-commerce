version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: monk_commerce_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: monk_commerce
      MYSQL_USER: dbuser
      MYSQL_PASSWORD: dbpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: monk_commerce_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_USER: dbuser
      DB_PASSWORD: dbpassword
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: monk_commerce
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
